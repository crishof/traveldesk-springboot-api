# Stable test profile to avoid external SMTP dependencies.
BASE64_SECRET_KEY=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
jwt.secret_key=${BASE64_SECRET_KEY}
app.mail.enabled=false
app.reset-password.base-url=http://localhost:4200/reset-password
app.accept-invite.base-url=http://localhost:4200/accept-invite
spring.mail.host=localhost
spring.mail.port=2525
spring.datasource.url=jdbc:h2:mem:traveldesk-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
# Flyway deshabilitado en tests: el esquema lo crea Hibernate en H2 (create-drop);
# las migraciones estan escritas en SQL de PostgreSQL y no aplican a H2.
spring.flyway.enabled=false
# Rate limiting deshabilitado en tests para evitar falsos positivos por repeticion de peticiones.
app.security.rate-limit.enabled=false

