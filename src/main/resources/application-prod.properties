# ============================
# PROD PROFILE ? Railway deploy
# ============================

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}
spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres

# DDL: Flyway gestiona el esquema; Hibernate solo valida
spring.jpa.hibernate.ddl-auto=validate

# Railway / proxy
server.forward-headers-strategy=framework

# Mail
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.provider=${MAIL_PROVIDER:brevo-api}
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:30000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:30000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:30000}

# Frontend y CORS de prod
# NOTA DE SEGURIDAD: no usar comodines (p. ej. https://*.vercel.app) junto con allowCredentials(true):
# cualquier despliegue de terceros en ese dominio pasaria a ser origen de confianza. Fijar dominios exactos.
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://traveldesk-pi.vercel.app}
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:https://traveldesk-pi.vercel.app/reset-password}
app.accept-invite.base-url=${ACCEPT_INVITE_BASE_URL:https://traveldesk-pi.vercel.app/accept-invite}

# Logging minimo en prod
spring.jpa.show-sql=false
logging.level.com.crishof=INFO
logging.level.root=WARN

# Actuator
management.endpoint.health.show-details=never

# Swagger deshabilitado en prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
