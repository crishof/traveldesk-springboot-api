# ============================
# APP SETTINGS
# ============================
spring.application.name=travelDesk-api
server.port=${PORT:8090}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties]
# ============================
# HIKARICP (Connection Pool)
# ============================
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.rewriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000
# ============================
# JPA / HIBERNATE (common)
# ============================
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.format_sql=true
# ============================
# FLYWAY (versionado del esquema)
# ============================
# baseline-on-migrate: para BBDD existentes creadas antes con ddl-auto (dev/prod ya desplegado),
# Flyway las marca como baseline v1 sin re-ejecutar V1. En una BBDD vacia ejecuta V1 desde cero.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# ============================
# LOGGING (base)
# ============================
logging.level.root=WARN
logging.level.com.crishof=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.devtools.restart.SilentExitExceptionHandler=ERROR
logging.level.org.springframework.boot.devtools.restart=OFF
# ============================
# JWT
# ============================
jwt.secret_key=${BASE64_SECRET_KEY}
jwt.expiration=900000
jwt.refresh-expiration=604800000
# ============================
# APP MAIL
# ============================
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@mail.local}}
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.brevo.api-url=${BREVO_API_URL:https://api.brevo.com/v3}
app.mail.brevo.api-key=${BREVO_API_KEY:}
app.mail.brevo.timeout-seconds=${BREVO_API_TIMEOUT_SECONDS:15}
app.email-verification.code-ttl-minutes=${EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
# Frontend URLs are defined per profile (dev/prod/test)
# ============================
# RATE LIMITING (endpoints de auth sensibles)
# ============================
app.security.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.security.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:10}
app.security.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
# ============================
# CORS
# ============================
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
# ============================
# SPRING MAIL
# ============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}
# ============================
# External APIs
# ============================
app.free-currency.base-url=${FREE_CURRENCY_BASE_URL:https://api.freecurrencyapi.com/v1}
app.free-currency.api-key=${FREE_CURRENCY_APIKEY:}
app.free-currency.timeout=${FREE_CURRENCY_TIMEOUT:5s}
# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
